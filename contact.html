<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
        <!-- font awesome -->
        <script src="https://kit.fontawesome.com/8441bb9e17.js" crossorigin="anonymous"></script>
        <script src="script.js"></script>
        
        <title>Punk From The West</title>
    </head>
    <body>
        <nav id="navbarMain" class="navbar navbar-dark navbar-expand-md py-0 fixed-top bg-black">
            <a href="#" class="navbar-brand">Punk From The West <i class="fas fa-fist-raised"></i></a>
            <button class="navbar-toggler" data-toggle="collapse" data-target="#navLinks" aria-label="toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navLinks">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="home.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="galeri.html" class="nav-link">Galeri</a>
                    </li>
                    <li class="nav-item">
                        <a href="about.html" class="nav-link">About</a>
                    </li>
                    <li class="nav-item active">
                        <a href="contact.html" class="nav-link">Contact Me</a>
                    </li>
                </ul>
            </div>
        </nav>

        <section id="formContactContent">
            <div class="container mt-5 text-light">
                <div class="row mt-5 text-light">
                    <div class="col-4 align-self-center">
                        <p><i class="fas fa-envelope-open"></i></p>
                    </div>
                    <div class="col-8">
                        <form name="formContact" method="POST" autocomplete="on" action="" onsubmit="validateForm();">
                            <label for="name">Name</label> 
                            <input type="text" class="form-control" id="name" name="name" placeholder="Name" autofocus/>
                            
                            <label for="email">E-Mail</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="something@yourmail.thedomain" autofocus>
                    
                            <label for="subject">Subject</label>
                            <input type="text" class="form-control" id="subject" name="subject" autofocus>
                    
                            <label for="message">Your Message</label>
                            <textarea type="text" class="form-control" id="message" name="message"></textarea>
                            <br>
                            <div class="d-flex justify-content-end">
                                <button type="submit" class="btn btn-outline-light">Send</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Optional JavaScript -->
        <!-- jQuery first, then Popper.js, then Bootstrap JS -->
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    </body>
</html>
